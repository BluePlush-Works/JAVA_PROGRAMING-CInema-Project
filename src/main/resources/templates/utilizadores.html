<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registar Utilizador</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main>
    <header class="cabecalho">
        <h1 id="tituloFormulario">Novo utilizador</h1>
        <p>Preencha os dados para registar um novo utilizador</p>
    </header>

    <nav class="menu">
        <a href="/registo">Novo Utilizador</a>
        <a href="/clientes">Clientes</a>
        <a href="/funcionarios">Funcionários</a>
        <a href="/utilizadores">Utilizadores</a>
    </nav>

    <section class="cartao">

        <p th:if="${erro}" th:text="${erro}" class="erro"></p>

        <form action="/registo" method="post" class="formulario">

            <label for="perfil">Tipo de utilizador</label>
            <select name="perfil" id="perfil" onchange="mudarFormulario()" required>
                <option value="">Selecione</option>
                <option value="CLIENTE">Clientes</option>
                <option value="FUNCIONARIO">Funcionários</option>
            </select>

            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" placeholder="Nome completo" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Email" required>

            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="Senha" required>

            <label for="contato">Telefone</label>
            <input type="text" id="contato" name="contato" placeholder="Contato" required>


            <div id="camponFuncionario" class="campo-nFuncionario">
                <label for="nFuncionario">Número de Funcionário</label>
                <input type="text" id="nFuncionario" name="nFuncionario" placeholder="Número de Funcionário">
            </div>

            <div id="campoCargo" class="campo-cargo">
                <label for="cargo">Cargo</label>
                <input type="text" id="cargo" name="cargo" placeholder="Cargo">
            </div>

            <div id="campoTurno" class="campo-turno">
                <label for="turno">Turno</label>
                <input type="text" id="turno" name="turno" placeholder="Turno">
            </div>

            <div id="campoNif" class="campo-nif">
                <label for="nif">NIF</label>
                <input type="number" id="nif" name="nif" placeholder="NIF">
            </div>


            <button type="submit" onclick="mostrarMensagem()">Adicionar</button>
        </form>

    </section>

</main>
<script src="/js/script.js"></script>
</body>
</html>
